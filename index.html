<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>辦公室點餐系統</title>
<style>
/* ══════════════════════════════════════
   深色主題配色
   背景層：#0f1117 → #1a1d27 → #22263a
   強調色：#1CAABA（青藍）
   文字：  #e8eaf0（主）#9ca3b0（次）#5a6278（弱）
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#0f1117;color:#e8eaf0;font-size:14px;min-height:100vh}

/* ── Header ── */
.app-header{background:#1a1d27;border-bottom:1px solid #2d3148;padding:0 1.5rem;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:10}
.app-header-brand{font-size:15px;font-weight:600;color:#e8eaf0;margin-left:4px}
.app-header-right{margin-left:auto;font-size:12px;color:#9ca3b0}

/* ── Layout ── */
.container{max-width:1200px;margin:0 auto;padding:1.5rem}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;margin-bottom:1.5rem;background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:4px}
.tab{flex:1;padding:8px 10px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#9ca3b0;border-radius:7px;transition:all .15s;text-align:center}
.tab.active{background:#1CAABA;color:#fff}
.tab:hover:not(.active){background:#22263a;color:#e8eaf0}
.section{display:none}.section.active{display:block}

/* ── Cards ── */
.card{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:600;margin-bottom:1.25rem;color:#e8eaf0}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
@media(max-width:540px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:#9ca3b0;text-transform:uppercase;letter-spacing:0.4px}
input,select,textarea{width:100%;padding:8px 11px;font-size:14px;border:1px solid #2d3148;border-radius:8px;background:#22263a;color:#e8eaf0;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1CAABA}
input::placeholder{color:#5a6278}
select option{background:#22263a;color:#e8eaf0}
textarea{resize:vertical;min-height:64px}

/* ── Buttons ── */
.btn-primary{background:#1CAABA;color:#fff;border:none;padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:none;border:1px solid #2d3148;color:#9ca3b0;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#22263a;color:#e8eaf0}
.btn-sm{padding:5px 10px;font-size:12px;border:1px solid #2d3148;border-radius:6px;background:none;color:#9ca3b0;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-sm:hover{background:#22263a;color:#e8eaf0}
.btn-edit{border-color:#1CAABA;color:#1CAABA}
.btn-edit:hover{background:rgba(28,170,186,.15)}
.btn-danger{border-color:#e74c3c;color:#e74c3c}
.btn-danger:hover{background:rgba(231,76,60,.15)}

/* ── Stars ── */
.stars{display:flex;gap:3px}
.star{font-size:22px;cursor:pointer;color:#2d3148;transition:color .08s;user-select:none;line-height:1}
.stars-display{color:#f5a623;letter-spacing:1px}

/* ── Filters ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.filters input,.filters select{width:auto;flex:1;min-width:120px;font-size:13px;padding:7px 10px}
.filter-label{font-size:12px;color:#9ca3b0;white-space:nowrap}

/* ── Table ── */
.table-wrap{overflow-x:auto;border:1px solid #2d3148;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:900px}
th{padding:10px 14px;text-align:left;font-weight:600;font-size:11px;color:#9ca3b0;letter-spacing:0.3px;text-transform:uppercase;border-bottom:1px solid #2d3148;background:#1a1d27;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#e8eaf0}
th .sort-icon{font-size:10px;margin-left:3px;opacity:.4}
th.sort-active .sort-icon{opacity:1;color:#1CAABA}
td{padding:10px 14px;border-bottom:1px solid #22263a;color:#e8eaf0;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#22263a}
.group-header td{background:#1e2438 !important;font-weight:600;font-size:12px;color:#1CAABA;padding:7px 14px;border-bottom:1px solid #2d3148;border-top:2px solid #2d3148}
.empty{text-align:center;padding:2.5rem 1rem;color:#5a6278;font-size:14px}
.loading{text-align:center;padding:2rem;color:#5a6278;font-size:13px}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.2px}
.badge-飲料{background:rgba(28,170,186,.2);color:#1CAABA}
.badge-便當{background:rgba(245,166,35,.2);color:#f5a623}
.badge-其他{background:rgba(156,163,176,.15);color:#9ca3b0}

/* ── History footer ── */
.history-footer{margin-top:12px;font-size:13px;color:#9ca3b0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.history-footer strong{color:#e8eaf0}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 0 4px;flex-wrap:wrap}
.pagination button{min-width:36px;height:34px;padding:0 10px;border-radius:8px;border:1px solid #2d3148;background:#1a1d27;cursor:pointer;font-size:13px;color:#9ca3b0;transition:all .15s}
.pagination button:hover:not(:disabled){background:#22263a;border-color:#1CAABA;color:#1CAABA}
.pagination button.active{background:#1CAABA;color:#fff;border-color:#1CAABA;font-weight:600}
.pagination button:disabled{opacity:.3;cursor:default}
.pagination .page-info{font-size:13px;color:#5a6278;padding:0 4px}

/* ── Settings ── */
.settings-section{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.settings-title{font-size:14px;font-weight:600;margin-bottom:1rem;color:#e8eaf0;display:flex;align-items:center;gap:8px}
.settings-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.settings-field label{font-size:11px;font-weight:600;color:#9ca3b0;text-transform:uppercase;letter-spacing:0.4px}
.settings-field input{padding:7px 10px;font-size:13px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag-item{display:flex;align-items:center;gap:5px;background:#22263a;border:1px solid #2d3148;border-radius:20px;padding:3px 10px;font-size:12px;color:#e8eaf0}
.tag-item button{border:none;background:none;cursor:pointer;color:#5a6278;font-size:14px;padding:0;line-height:1}
.tag-item button:hover{color:#e74c3c}
.add-tag-row{display:flex;gap:6px;margin-top:8px}
.add-tag-row input{flex:1;padding:6px 10px;font-size:13px}
.add-tag-row button{padding:6px 12px;background:#1CAABA;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500}
.add-tag-row button:hover{opacity:.85}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1a1d27;border:1px solid #2d3148;border-radius:14px;padding:1.5rem;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1.25rem;color:#e8eaf0}
.modal-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}

/* ── Confirm dialog ── */
.confirm-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:24px 28px;min-width:260px;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.5);text-align:center}
.confirm-box p{margin:0 0 20px;font-size:15px;color:#e8eaf0;line-height:1.5}
.confirm-box .confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-box .confirm-btns button{flex:1;padding:9px 0;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-weight:500}
.confirm-cancel{background:#22263a;color:#9ca3b0}.confirm-cancel:hover{background:#2d3148}
.confirm-ok{background:#e74c3c;color:#fff}.confirm-ok:hover{background:#c0392b}

/* ── Save mask ── */
.save-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8500;align-items:flex-end;justify-content:center;padding-bottom:80px}
.save-mask.show{display:flex}
.save-toast{background:#1a1d27;border:1px solid #2d3148;border-radius:14px;padding:18px 36px;font-size:16px;font-weight:600;color:#e8eaf0;box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:12px}
.save-toast .spinner{width:22px;height:22px;border:3px solid #2d3148;border-top-color:#1CAABA;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.save-toast.success{color:#1CAABA}
.save-toast.fail{color:#e74c3c}

/* ── Tooltip ── */
.note-tooltip{position:fixed;z-index:8000;background:#22263a;border:1px solid #2d3148;color:#e8eaf0;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.6;max-width:280px;white-space:pre-wrap;word-break:break-all;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.note-tooltip.show{opacity:1}

/* ── Misc ── */
.save-msg{margin-left:12px;font-size:13px;color:#1CAABA;font-weight:500;display:none}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:1rem 1.25rem}
.metric-label{font-size:11px;font-weight:600;color:#9ca3b0;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;color:#e8eaf0;letter-spacing:-0.5px}
.person-card{background:#1a1d27;border:1px solid #2d3148;border-radius:10px;margin-bottom:10px;overflow:hidden}
.person-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;transition:background .12s}
.person-header:hover{background:#22263a}
.person-left{display:flex;align-items:center;gap:10px}
.person-avatar{width:32px;height:32px;border-radius:50%;background:#1CAABA;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.person-name{font-weight:600;font-size:14px;color:#e8eaf0}
.person-stats{font-size:12px;color:#9ca3b0;margin-top:1px}
.chevron{font-size:12px;color:#5a6278;transition:transform .2s}
.person-body{display:none;border-top:1px solid #2d3148;padding:12px 16px}
.person-date-filters{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.person-date-filters input{padding:7px 10px;font-size:13px;border:1px solid #2d3148;border-radius:7px;width:auto}
</style>
</head>
<body>

<div class="app-header">
  <span class="app-header-brand" id="brand-name">果亞創意</span>
  <span class="app-header-right" id="sync-status">讀取中…</span>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('order')" id="tab-btn-order">＋ 新增訂單</button>
    <button class="tab" onclick="showTab('history')" id="tab-btn-history">📋 訂購記錄</button>
    <button class="tab" onclick="showTab('settings')" id="tab-btn-settings">⚙️ 功能設定</button>
  </div>

  <!-- 新增訂單 -->
  <div class="section active" id="tab-order">
    <div class="card">
      <p class="card-title" id="form-title-text">填寫訂單資料</p>
      <div class="form-grid">
        <div class="form-group">
          <label id="label-date">日期</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-group">
          <label id="label-type">類別</label>
          <select id="f-type"></select>
        </div>
        <div class="form-group">
          <label id="label-shop">店名</label>
          <input type="text" id="f-shop" placeholder="例：50嵐、池上便當" list="shop-list" autocomplete="off">
          <datalist id="shop-list"></datalist>
        </div>
        <div class="form-group">
          <label id="label-item">品名</label>
          <input type="text" id="f-item" placeholder="例：珍珠奶茶、雞腿便當">
        </div>
        <div class="form-group full">
          <label id="label-mod">調整細項</label>
          <input type="text" id="f-mod" placeholder="例：少糖少冰、不要香菜、加辣">
        </div>
        <div class="form-group">
          <label id="label-qty">數量</label>
          <input type="number" id="f-qty" value="1" min="1">
        </div>
        <div class="form-group">
          <label id="label-price">單價（元）</label>
          <input type="number" id="f-price" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label id="label-person">訂購人</label>
          <input type="text" id="f-person" placeholder="姓名" list="person-list" autocomplete="off">
          <datalist id="person-list"></datalist>
        </div>
        <div class="form-group">
          <label id="label-rating">評分</label>
          <div class="stars" id="star-row">
            <span class="star" data-v="1">★</span>
            <span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span>
            <span class="star" data-v="4">★</span>
            <span class="star" data-v="5">★</span>
          </div>
        </div>
        <div class="form-group full">
          <label id="label-note">備註</label>
          <textarea id="f-note" placeholder="心得、評價、下次注意事項…"></textarea>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="btn-primary" onclick="addOrder()" id="btn-save-order">儲存訂單</button>
        <span class="save-msg" id="save-msg">✓ 已儲存！</span>
      </div>
    </div>
  </div>

  <!-- 訂購記錄 -->
  <div class="section" id="tab-history">
    <div class="card" style="padding-bottom:1rem">
      <div class="filters">
        <input type="text" id="s-keyword" placeholder="搜尋店名、品名、訂購人、備註…" oninput="renderHistory(true)" style="min-width:200px;flex:2">
        <select id="s-type" onchange="renderHistory(true)" style="min-width:100px">
          <option value="">全部類別</option>
        </select>
        <select id="s-person" onchange="renderHistory(true)" style="min-width:100px">
          <option value="">全部訂購人</option>
        </select>
        <span class="filter-label">日期：</span>
        <input type="date" id="s-from" onchange="renderHistory(true)" style="min-width:130px">
        <span class="filter-label">至</span>
        <input type="date" id="s-to" onchange="renderHistory(true)" style="min-width:130px">
        <button class="btn-secondary" onclick="clearFilters()">清除篩選</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:64px" onclick="sortBy('type')" id="th-type">類別<span class="sort-icon">↕</span></th>
              <th style="width:88px" onclick="sortBy('shop')" id="th-shop"><span id="col-shop">店名</span><span class="sort-icon">↕</span></th>
              <th style="width:110px" onclick="sortBy('item')" id="th-item">品名<span class="sort-icon">↕</span></th>
              <th style="width:100px">調整細項</th>
              <th style="width:50px;text-align:center" onclick="sortBy('qty')" id="th-qty">數量<span class="sort-icon">↕</span></th>
              <th style="width:72px;text-align:right" onclick="sortBy('total')" id="th-total">小計<span class="sort-icon">↕</span></th>
              <th style="width:72px" onclick="sortBy('person')" id="th-person">訂購人<span class="sort-icon">↕</span></th>
              <th style="width:70px" onclick="sortBy('rating')" id="th-rating">評分<span class="sort-icon">↕</span></th>
              <th style="width:130px">操作</th>
            </tr>
          </thead>
          <tbody id="history-body"><tr><td colspan="9" class="loading">讀取中…</td></tr></tbody>
        </table>
      </div>
      <div class="history-footer" id="history-summary"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- 功能設定 -->
  <div class="section" id="tab-settings">
    <div class="settings-section">
      <div class="settings-title">🏷️ 品牌名稱</div>
      <div class="settings-field">
        <label>右上角顯示名稱</label>
        <input type="text" id="cfg-brand" placeholder="例：果亞創意">
      </div>
      <button class="btn-primary" onclick="saveSettings()">儲存設定</button>
      <span class="save-msg" id="cfg-save-msg">✓ 已儲存！</span>
    </div>

    <div class="settings-section">
      <div class="settings-title">📋 頁籤名稱</div>
      <div class="form-grid">
        <div class="settings-field">
          <label>新增訂單 頁籤</label>
          <input type="text" id="cfg-tab-order" placeholder="新增訂單">
        </div>
        <div class="settings-field">
          <label>訂購記錄 頁籤</label>
          <input type="text" id="cfg-tab-history" placeholder="訂購記錄">
        </div>
        <div class="settings-field">
          <label>功能設定 頁籤</label>
          <input type="text" id="cfg-tab-settings" placeholder="功能設定">
        </div>
      </div>
      <button class="btn-primary" onclick="saveSettings()">儲存設定</button>
    </div>

    <div class="settings-section">
      <div class="settings-title">📝 表單欄位名稱</div>
      <div class="form-grid">
        <div class="settings-field"><label>日期 欄位</label><input type="text" id="cfg-lbl-date" placeholder="日期"></div>
        <div class="settings-field"><label>類別 欄位</label><input type="text" id="cfg-lbl-type" placeholder="類別"></div>
        <div class="settings-field"><label>店名 欄位</label><input type="text" id="cfg-lbl-shop" placeholder="店名"></div>
        <div class="settings-field"><label>品名 欄位</label><input type="text" id="cfg-lbl-item" placeholder="品名"></div>
        <div class="settings-field"><label>調整細項 欄位</label><input type="text" id="cfg-lbl-mod" placeholder="調整細項"></div>
        <div class="settings-field"><label>數量 欄位</label><input type="text" id="cfg-lbl-qty" placeholder="數量"></div>
        <div class="settings-field"><label>單價 欄位</label><input type="text" id="cfg-lbl-price" placeholder="單價（元）"></div>
        <div class="settings-field"><label>訂購人 欄位</label><input type="text" id="cfg-lbl-person" placeholder="訂購人"></div>
        <div class="settings-field"><label>評分 欄位</label><input type="text" id="cfg-lbl-rating" placeholder="評分"></div>
        <div class="settings-field"><label>備註 欄位</label><input type="text" id="cfg-lbl-note" placeholder="備註"></div>
      </div>
      <button class="btn-primary" onclick="saveSettings()">儲存設定</button>
    </div>

    <div class="settings-section">
      <div class="settings-title">🔽 類別下拉選單</div>
      <div class="tag-list" id="type-tag-list"></div>
      <div class="add-tag-row">
        <input type="text" id="new-type-input" placeholder="輸入新類別名稱">
        <button onclick="addTypeOption()">新增</button>
      </div>
      <p style="font-size:12px;color:#aaa;margin-top:8px">點 × 可刪除選項</p>
    </div>

    <div class="settings-section">
      <div class="settings-title">👤 訂購人名單</div>
      <div class="tag-list" id="person-tag-list"></div>
      <div class="add-tag-row">
        <input type="text" id="new-person-input" placeholder="輸入新訂購人姓名">
        <button onclick="addPersonOption()">新增</button>
      </div>
      <p style="font-size:12px;color:#aaa;margin-top:8px">點 × 可刪除，訂購人也可在訂單頁面自由輸入</p>
    </div>
  </div>
</div>

<!-- 修改訂單 Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-message">確定刪除此筆記錄？</p>
    <div class="confirm-btns">

<script>
/* ================================================
   辦公室點餐系統 v4 - Google Sheets 後端版
   ================================================ */

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxbwtKdqkM7ITk0FZZOhkK1ovHf49urJfyRTpS5bP1PbDSGghkjfAitM5n6bCwgEBnw2g/exec'; // 部署後填入

/* ─── 自訂確認對話框 ─── */
function customConfirm(message) {
  return new Promise(resolve => {
    const overlay = document.getElementById('confirm-overlay');
    const msgEl = document.getElementById('confirm-message');
    const okBtn = document.getElementById('confirm-ok-btn');
    const cancelBtn = document.getElementById('confirm-cancel-btn');
    msgEl.textContent = message;
    overlay.classList.add('show');
    function cleanup() {
      overlay.classList.remove('show');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
    }
    function onOk() { cleanup(); resolve(true); }
    function onCancel() { cleanup(); resolve(false); }
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
  });
}

/* ─── Google Sheets API ─── */
let orders = [];
let settings = {};
let sortCol = 'date';
let sortDir = -1;
let currentRating = 0;
let editRating = 0;
let dataLoaded = false;

const DEFAULT_SETTINGS = {
  brand: '果亞創意',
  tabs: { order: '＋ 新增訂單', history: '📋 訂購記錄', settings: '⚙️ 功能設定' },
  labels: { date:'日期', type:'類別', shop:'店名', item:'品名', mod:'調整細項', qty:'數量', price:'單價（元）', person:'訂購人', rating:'評分', note:'備註' },
  types: ['飲料','便當','其他'],
  persons: ['Ellis']
};

async function apiCall(action, body = {}) {
  if (!GAS_URL || GAS_URL.includes('%%')) {
    console.warn('[apiCall] GAS_URL 尚未設定');
    return {};
  }
  // 讀取用 GET（無 CORS 問題），寫入用 POST（避免 URL 長度限制）
  const readActions = ['getOrders', 'getSettings'];
  const isRead = readActions.includes(action);
  try {
    let res;
    if (isRead) {
      const params = new URLSearchParams({ action });
      res = await fetch(GAS_URL + '?' + params.toString(), {
        method: 'GET', redirect: 'follow'
      });
    } else {
      res = await fetch(GAS_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...body })
      });
    }
    const text = await res.text();
    if (!text || text.trim().startsWith('<')) {
      console.error('[apiCall] 非 JSON 回應:', text.slice(0, 300));
      return {};
    }
    return JSON.parse(text);
  } catch(e) {
    console.error('[apiCall] 錯誤:', e);
    return {};
  }
}

async function loadData() {
  updateSyncStatus('載入中…');
  try {
    const [ordersRes, settingsRes] = await Promise.all([
      apiCall('getOrders'),
      apiCall('getSettings')
    ]);
    orders = (ordersRes && ordersRes.orders) ? ordersRes.orders : [];
    const rawSettings = (settingsRes && settingsRes.settings) ? settingsRes.settings : {};
    settings = deepMerge(DEFAULT_SETTINGS, rawSettings);
    updateSyncStatus('');
  } catch(e) {
    console.error('loadData error:', e);
    orders = [];
    settings = deepMerge(DEFAULT_SETTINGS, {});
    updateSyncStatus('⚠️ 無法連線');
  } finally {
    // 不管成功或失敗，一定要完成初始化，讓頁面可以操作
    dataLoaded = true;
    applySettings();
    updateDatalistOptions();
  }
}

async function saveOrders() {
  updateSyncStatus('儲存中…');
  try {
    await apiCall('saveOrders', { orders });
    updateSyncStatus('✓ 已同步');
  } catch(e) {
    updateSyncStatus('⚠️ 儲存失敗');
  }
  setTimeout(() => updateSyncStatus(''), 2000);
}

async function deleteOrderFromServer(id) {
  try {
    await apiCall('deleteOrder', { id });
  } catch(e) {
    console.error('deleteOrder error:', e);
  }
}

async function saveSettingsData() {
  try { await apiCall('saveSettings', { settings }); } catch(e) {}
}

function updateSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg || '';
}

function deepMerge(def, obj) {
  const res = {...def};
  for (const k in obj) {
    if (typeof def[k] === 'object' && !Array.isArray(def[k]) && def[k] !== null && obj[k] !== null && typeof obj[k] === 'object') {
      res[k] = deepMerge(def[k], obj[k]);
    } else if (obj[k] !== undefined) {
      res[k] = obj[k];
    }
  }
  return res;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initDate() {
  // 使用本地時間，避免 UTC 時差導致日期差一天
  const now = new Date();
  const today = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');
  document.getElementById('f-date').value = today;
  // 篩選日期預設空白，顯示全部資料
  document.getElementById('s-from').value = '';
  document.getElementById('s-to').value = '';
}

/* ─── 設定套用 ─── */
function applySettings() {
  document.getElementById('brand-name').textContent = settings.brand || '果亞創意';
  const tabs = settings.tabs;
  document.getElementById('tab-btn-order').textContent = tabs.order;
  document.getElementById('tab-btn-history').textContent = tabs.history;
  document.getElementById('tab-btn-settings').textContent = tabs.settings;
  const lb = settings.labels;
  document.getElementById('label-date').textContent = lb.date;
  document.getElementById('label-type').textContent = lb.type;
  document.getElementById('label-shop').textContent = lb.shop;
  document.getElementById('label-item').textContent = lb.item;
  document.getElementById('label-mod').textContent = lb.mod;
  document.getElementById('label-qty').textContent = lb.qty;
  document.getElementById('label-price').textContent = lb.price;
  document.getElementById('label-person').textContent = lb.person;
  document.getElementById('label-rating').textContent = lb.rating;
  document.getElementById('label-note').textContent = lb.note;
  rebuildTypeSelect('f-type');
  renderPersonTagList();
  renderTypeTagList();
  rebuildPersonSelect();
  updateDatalistOptions();
}

function fillSettingsForm() {
  document.getElementById('cfg-brand').value = settings.brand || '';
  document.getElementById('cfg-tab-order').value = settings.tabs.order || '';
  document.getElementById('cfg-tab-history').value = settings.tabs.history || '';
  document.getElementById('cfg-tab-settings').value = settings.tabs.settings || '';
  const lb = settings.labels;
  [['date','date'],['type','type'],['shop','shop'],['item','item'],['mod','mod'],['qty','qty'],['price','price'],['person','person'],['rating','rating'],['note','note']].forEach(([k,s]) => {
    const el = document.getElementById('cfg-lbl-' + s);
    if (el) el.value = lb[k] || '';
  });
}

function rebuildTypeSelect(id) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = (settings.types||[]).map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  if (cur) sel.value = cur;
}

function rebuildPersonSelect() {
  const sel = document.getElementById('s-person');
  if (!sel) return;
  const fromSettings = settings.persons || [];
  const fromOrders = [...new Set(orders.map(x => x.person).filter(Boolean))];
  const all = [...new Set([...fromSettings, ...fromOrders])].sort((a,b) => a.localeCompare(b,'zh-TW'));
  sel.innerHTML = '<option value="">全部訂購人</option>' + all.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
}

function renderTypeTagList() {
  const el = document.getElementById('type-tag-list');
  if (!el) return;
  el.innerHTML = (settings.types||[]).map((t,i) =>
    `<span class="tag">${esc(t)}<button onclick="removeTypeOption(${i})" title="刪除">×</button></span>`
  ).join('');
}

function renderPersonTagList() {
  const el = document.getElementById('person-tag-list');
  if (!el) return;
  el.innerHTML = (settings.persons||[]).map((p,i) =>
    `<span class="tag">${esc(p)}<button onclick="removePersonOption(${i})" title="刪除">×</button></span>`
  ).join('');
}

async function addTypeOption() {
  const inp = document.getElementById('new-type-input');
  const val = inp.value.trim();
  if (!val) return;
  if (!settings.types.includes(val)) {
    settings.types.push(val);
    renderTypeTagList();
    rebuildTypeSelect('f-type');
    rebuildTypeSelect('edit-type');
    await saveSettingsData(); // 立即儲存到 Sheets
  }
  inp.value = '';
}

async function removeTypeOption(i) {
  settings.types.splice(i, 1);
  renderTypeTagList();
  rebuildTypeSelect('f-type');
  rebuildTypeSelect('edit-type');
  await saveSettingsData(); // 立即儲存到 Sheets
}

async function addPersonOption() {
  const inp = document.getElementById('new-person-input');
  const val = inp.value.trim();
  if (!val) return;
  if (!settings.persons) settings.persons = [];
  if (!settings.persons.includes(val)) {
    settings.persons.push(val);
    renderPersonTagList();
    rebuildPersonSelect();
    updateDatalistOptions();
    await saveSettingsData(); // 立即儲存到 Sheets
  }
  inp.value = '';
}

async function removePersonOption(i) {
  settings.persons.splice(i, 1);
  renderPersonTagList();
  rebuildPersonSelect();
  updateDatalistOptions();
  await saveSettingsData(); // 立即儲存到 Sheets
}

function updateDatalistOptions() {
  const shopList = document.getElementById('shop-list');
  const itemList = document.getElementById('item-list');
  const personList = document.getElementById('person-list');
  if (shopList) shopList.innerHTML = [...new Set(orders.map(o=>o.shop).filter(Boolean))].sort().map(s=>`<option value="${esc(s)}">`).join('');
  if (itemList) itemList.innerHTML = [...new Set(orders.map(o=>o.item).filter(Boolean))].sort().map(s=>`<option value="${esc(s)}">`).join('');
  if (personList) {
    const fromSettings = settings.persons || [];
    const fromOrders = [...new Set(orders.map(o=>o.person).filter(Boolean))];
    const all = [...new Set([...fromSettings, ...fromOrders])];
    personList.innerHTML = all.map(p=>`<option value="${esc(p)}">`).join('');
  }
  const editShopList = document.getElementById('edit-shop-list');
  if (editShopList) editShopList.innerHTML = [...new Set(orders.map(o=>o.shop).filter(Boolean))].sort().map(s=>`<option value="${esc(s)}">`).join('');
  const editPersonList = document.getElementById('edit-person-list');
  if (editPersonList) {
    const fromSettings = settings.persons || [];
    const fromOrders = [...new Set(orders.map(x => x.person).filter(Boolean))];
    const all = [...new Set([...fromSettings, ...fromOrders])].sort((a,b)=>a.localeCompare(b,'zh-TW'));
    editPersonList.innerHTML = all.map(p => `<option value="${esc(p)}">`).join('');
  }
}

async function saveSettings() {
  settings.brand = document.getElementById('cfg-brand').value.trim() || settings.brand;
  settings.tabs.order    = document.getElementById('cfg-tab-order').value.trim() || settings.tabs.order;
  settings.tabs.history  = document.getElementById('cfg-tab-history').value.trim() || settings.tabs.history;
  settings.tabs.settings = document.getElementById('cfg-tab-settings').value.trim() || settings.tabs.settings;
  [['date','date'],['type','type'],['shop','shop'],['item','item'],['mod','mod'],['qty','qty'],['price','price'],['person','person'],['rating','rating'],['note','note']].forEach(([k,s]) => {
    const el = document.getElementById('cfg-lbl-' + s);
    if (el && el.value.trim()) settings.labels[k] = el.value.trim();
  });
  await saveSettingsData();
  applySettings();
  alert('設定已儲存');
}

/* ─── 新增訂單 ─── */
async function addOrder() {
  const btn = document.getElementById('btn-save-order');
  if (btn.disabled) return; // 防止重複送出

  const date   = document.getElementById('f-date').value;
  const type   = document.getElementById('f-type').value;
  const shop   = document.getElementById('f-shop').value.trim();
  const item   = document.getElementById('f-item').value.trim();
  const mod    = document.getElementById('f-mod').value.trim();
  const qty    = parseInt(document.getElementById('f-qty').value) || 1;
  const price  = parseFloat(document.getElementById('f-price').value) || 0;
  const person = document.getElementById('f-person').value.trim();
  const note   = document.getElementById('f-note').value.trim();
  if (!date || !shop || !item || !person) { alert('請填寫日期、店名、品名、訂購人'); return; }

  // 鎖定按鈕，防止重複點擊
  btn.disabled = true;
  btn.textContent = '儲存中…';

  const order = {
    id: Date.now(),
    date, type, shop, item, mod, qty, price,
    total: qty * price, person,
    rating: currentRating, note
  };
  orders.push(order);

  try {
    await saveOrders();
    // Reset form
    ['f-shop','f-item','f-mod','f-note'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-qty').value = 1;
    document.getElementById('f-price').value = '';
    currentRating = 0;
    updateStars('star-row', 0);
    updateDatalistOptions();
    // 顯示成功提示
    btn.textContent = '✓ 已儲存！';
    btn.style.background = '#27ae60';
    setTimeout(() => {
      btn.textContent = '儲存訂單';
      btn.style.background = '';
      btn.disabled = false;
    }, 1500);
  } catch(e) {
    orders.pop(); // 回滾
    btn.textContent = '儲存失敗，請重試';
    btn.style.background = '#e74c3c';
    setTimeout(() => {
      btn.textContent = '儲存訂單';
      btn.style.background = '';
      btn.disabled = false;
    }, 2000);
  }
}

/* ─── Stars ─── */
function updateStars(rowId, val) {
  document.querySelectorAll(`#${rowId} .star`).forEach(s => {
    s.style.color = Number(s.dataset.v) <= val ? '#f5a623' : '#ddd';
  });
}

/* ─── 修改 Modal ─── */
function openEditModal(id) {
  const o = orders.find(x => Number(x.id) === Number(id));
  if (!o) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-date').value = o.date;
  rebuildTypeSelect('edit-type');
  document.getElementById('edit-type').value = o.type;
  document.getElementById('edit-shop').value = o.shop;
  const editShopList = document.getElementById('edit-shop-list');
  editShopList.innerHTML = [...new Set(orders.map(x => x.shop))].sort().map(s => `<option value="${esc(s)}">`).join('');
  document.getElementById('edit-item').value = o.item;
  document.getElementById('edit-mod').value = o.mod || '';
  document.getElementById('edit-qty').value = o.qty;
  document.getElementById('edit-price').value = o.price;
  document.getElementById('edit-person').value = o.person;
  const editPersonList = document.getElementById('edit-person-list');
  if (editPersonList) {
    const fromSettings = settings.persons || [];
    const fromOrders = [...new Set(orders.map(x => x.person).filter(Boolean))];
    const allPersons = [...new Set([...fromSettings, ...fromOrders])].sort((a,b)=>a.localeCompare(b,'zh-TW'));
    editPersonList.innerHTML = allPersons.map(p => `<option value="${esc(p)}">`).join('');
  }
  document.getElementById('edit-note').value = o.note || '';
  editRating = o.rating || 0;
  updateStars('edit-star-row', editRating);
  document.getElementById('edit-modal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('show');
}

async function saveEditOrder() {
  const id = Number(document.getElementById('edit-id').value);
  const idx = orders.findIndex(x => Number(x.id) === id);
  if (idx < 0) return;
  const qty = parseInt(document.getElementById('edit-qty').value) || 1;
  const price = parseFloat(document.getElementById('edit-price').value) || 0;
  orders[idx] = {
    ...orders[idx],
    date:   document.getElementById('edit-date').value,
    type:   document.getElementById('edit-type').value,
    shop:   document.getElementById('edit-shop').value.trim(),
    item:   document.getElementById('edit-item').value.trim(),
    mod:    document.getElementById('edit-mod').value.trim(),
    qty, price, total: qty * price,
    person: document.getElementById('edit-person').value.trim(),
    rating: editRating,
    note:   document.getElementById('edit-note').value.trim()
  };
  await saveOrders();
  closeEditModal();
  renderHistory();
}

/* ─── 刪除 ─── */
async function deleteOrder(id) {
  if (!await customConfirm('確定刪除此筆記錄？')) return;
  const numId = Number(id);
  orders = orders.filter(o => Number(o.id) !== numId);
  // Delete from server AND save updated list
  await Promise.all([
    deleteOrderFromServer(numId),
    saveOrders()
  ]);
  renderHistory();
}

/* ─── 篩選 ─── */
function getFiltered() {
  const kw = (document.getElementById('s-keyword').value || '').toLowerCase();
  const tp = document.getElementById('s-type').value;
  const pr = document.getElementById('s-person').value;
  const fr = document.getElementById('s-from').value;
  const to = document.getElementById('s-to').value;
  return orders.filter(o => {
    if (tp && o.type !== tp) return false;
    if (pr && o.person !== pr) return false;
    if (fr && o.date < fr) return false;
    if (to && o.date > to) return false;
    if (kw && ![o.shop, o.item, o.person, o.mod, o.note].join(' ').toLowerCase().includes(kw)) return false;
    return true;
  });
}

function clearFilters() {
  ['s-keyword','s-from','s-to'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('s-type').value = '';
  document.getElementById('s-person').value = '';
  renderHistory();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  renderHistory();
}

/* ─── 渲染訂購記錄 ─── */
const PAGE_SIZE = 20;
let currentPage = 1;

function renderHistory(resetPage) {
  if (resetPage) currentPage = 1;
  const tbody = document.getElementById('history-body');
  let data = getFiltered();
  data.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') return sortDir * va.localeCompare(vb, 'zh-TW');
    return sortDir * (va - vb);
  });
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">尚無符合記錄</td></tr>';
    document.getElementById('history-summary').innerHTML = '篩選結果：<strong>0 筆</strong>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const totalPages = Math.ceil(data.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  const pageData = data.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  const groups = [];
  pageData.forEach(o => {
    const key = o.date + '|' + o.type + '|' + o.shop;
    let g = groups.find(x => x.key === key);
    if (!g) { g = {key, date:o.date, type:o.type, shop:o.shop, items:[]}; groups.push(g); }
    g.items.push(o);
  });
  const typeColors = { '飲料':'#e8f4fb', '便當':'#fef9e7', '其他':'#f9f9f9' };
  let html = '';
  groups.forEach(g => {
    const bgStyle = `background:${typeColors[g.type]||'#fff'}`;
    html += `<tr class="group-header">
      <td colspan="9">${g.date}　<span class="badge badge-${g.type}">${g.type}</span>　${esc(g.shop)}
        <span style="float:right;font-weight:400;color:#888">共 ${g.items.length} 筆</span>
      </td>
    </tr>`;
    g.items.forEach(o => {
      const noteAttr = o.note ? ` data-note="${esc(o.note)}"` : '';
      html += `<tr style="${bgStyle}"${noteAttr}>
        <td><span class="badge badge-${o.type}">${o.type}</span></td>
        <td title="${esc(o.shop)}">${esc(o.shop)}</td>
        <td title="${esc(o.item)}">${esc(o.item)}</td>
        <td title="${esc(o.mod||'—')}" style="color:${o.mod?'inherit':'#bbb'}">${esc(o.mod||'—')}</td>
        <td style="text-align:center">${o.qty}</td>
        <td style="text-align:right">$${o.total.toLocaleString()}</td>
        <td>${esc(o.person)}</td>
        <td class="stars-display" style="font-size:12px">${'★'.repeat(o.rating||0)}<span style="color:#e0e0e0">${'★'.repeat(5-(o.rating||0))}</span></td>
        <td style="white-space:nowrap">
          <button class="btn-sm btn-edit" onclick="openEditModal(${o.id})" style="margin-right:4px">修改</button>
          <button class="btn-sm btn-danger" onclick="deleteOrder(${o.id})">刪除</button>
        </td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;

  const tot = data.reduce((s, o) => s + o.total, 0);
  document.getElementById('history-summary').innerHTML =
    `篩選結果：<strong>${data.length} 筆</strong>　合計金額：<strong>$${tot.toLocaleString()}</strong>　<span style="color:#aaa;font-size:12px">第 ${currentPage} / ${totalPages} 頁</span>`;

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ 上一頁</button>`;
  const range = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) {
      range.push(i);
    } else if (range[range.length-1] !== '…') {
      range.push('…');
    }
  }
  range.forEach(p => {
    if (p === '…') {
      html += `<span class="page-info">…</span>`;
    } else {
      html += `<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
  });
  html += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>下一頁 ›</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderHistory();
  document.getElementById('history-body').closest('table').scrollIntoView({behavior:'smooth', block:'start'});
}

/* ─── 備註 Tooltip ─── */
(function() {
  const tip = document.getElementById('note-tooltip');
  if (!tip) { console.warn('note-tooltip element not found'); return; }
  let hideTimer;
  document.addEventListener('mouseover', e => {
    const row = e.target.closest('tr[data-note]');
    if (!row) { return; }
    clearTimeout(hideTimer);
    const note = row.getAttribute('data-note');
    if (!note) return;
    tip.textContent = '📝 ' + note;
    tip.classList.add('show');
  });
  document.addEventListener('mousemove', e => {
    if (!tip.classList.contains('show')) return;
    let x = e.clientX + 16, y = e.clientY + 16;
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    if (x + tw > window.innerWidth - 8) x = e.clientX - tw - 8;
    if (y + th > window.innerHeight - 8) y = e.clientY - th - 8;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
  document.addEventListener('mouseout', e => {
    const row = e.target.closest('tr[data-note]');
    if (!row) return;
    const related = e.relatedTarget;
    if (related && row.contains(related)) return;
    hideTimer = setTimeout(() => tip.classList.remove('show'), 80);
  });
})();

/* ─── 頁籤切換 ─── */
function showTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-btn-' + t).classList.add('active');
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'history') renderHistory();
  if (t === 'settings') fillSettingsForm();
}

function togglePerson(header) {
  const body = header.nextElementSibling;
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  header.querySelector('.chevron').style.transform = open ? '' : 'rotate(180deg)';
}

/* ─── 初始化 ─── */
document.addEventListener('DOMContentLoaded', async () => {
  initDate();
document.getElementById('star-row').addEventListener('click', e => {
    if (!e.target.dataset.v) return;
    currentRating = parseInt(e.target.dataset.v);
    updateStars('star-row', currentRating);
  });
  document.getElementById('star-row').addEventListener('mouseover', e => {
    if (!e.target.dataset.v) return;
    updateStars('star-row', parseInt(e.target.dataset.v));
  });
  document.getElementById('star-row').addEventListener('mouseleave', () => {
    updateStars('star-row', currentRating);
  });
  document.getElementById('edit-star-row').addEventListener('click', e => {
    if (!e.target.dataset.v) return;
    editRating = parseInt(e.target.dataset.v);
    updateStars('edit-star-row', editRating);
  });
  document.getElementById('edit-star-row').addEventListener('mouseover', e => {
    if (!e.target.dataset.v) return;
    updateStars('edit-star-row', parseInt(e.target.dataset.v));
  });
  document.getElementById('edit-star-row').addEventListener('mouseleave', () => {
    updateStars('edit-star-row', editRating);
  });
  document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('edit-modal')) closeEditModal();
  });
  
  
  await loadData();
});</script>
